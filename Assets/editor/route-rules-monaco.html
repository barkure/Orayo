<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Route Rules Monaco</title>
  <style>
    :root {
      color-scheme: light;
      --app-bg: #f6f6f6;
      --editor-bg: #fbfbfb;
      --border: #e3e3e3;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--app-bg);
      font-family: "Segoe UI", sans-serif;
    }

    #shell {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 0;
      background: var(--app-bg);
    }

    #editor {
      width: 100%;
      height: 100%;
      border: 1px solid var(--border);
      box-sizing: border-box;
      background: var(--editor-bg);
    }
  </style>
</head>
<body>
  <div id="shell">
    <div id="editor"></div>
  </div>

  <script>
    window.__editorReady = false;
    window.__pendingValue = '';
  </script>
  <script src="./monaco/vs/loader.js"></script>
  <script>
    require.config({ paths: { vs: './monaco/vs' } });
    window.MonacoEnvironment = {
      getWorkerUrl: function () {
        return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
          self.MonacoEnvironment = { baseUrl: './monaco/' };
          importScripts('./monaco/vs/base/worker/workerMain.js');
        `)}`;
      }
    };

    require(['vs/editor/editor.main', 'vs/language/json/monaco.contribution'], function () {
      monaco.languages.json.jsonDefaults.setDiagnosticsOptions({ validate: false });
      monaco.editor.defineTheme('orayo-light', {
        base: 'vs',
        inherit: true,
        rules: [
          { token: 'string.key.json', foreground: '9a2a2a' },
          { token: 'string.value.json', foreground: '0451a5' },
          { token: 'number', foreground: '098658' },
          { token: 'keyword', foreground: '0000ff' }
        ],
        colors: {
          'editor.background': '#fbfbfb',
          'editorLineNumber.foreground': '#9a9a9a',
          'editorLineNumber.activeForeground': '#4f4f4f',
          'editorIndentGuide.background1': '#ececec',
          'editor.selectionBackground': '#cfe8ff',
          'editor.inactiveSelectionBackground': '#e7f1fb',
          'editor.lineHighlightBackground': '#f3f3f3',
          'editorCursor.foreground': '#1f1f1f',
          'scrollbarSlider.background': '#d0d0d0aa',
          'scrollbarSlider.hoverBackground': '#b9b9b9cc',
          'scrollbarSlider.activeBackground': '#9f9f9fcc'
        }
      });

      const editor = monaco.editor.create(document.getElementById('editor'), {
        value: window.__pendingValue || '',
        language: 'json',
        automaticLayout: true,
        minimap: { enabled: false },
        glyphMargin: false,
        lineDecorationsWidth: 8,
        lineNumbersMinChars: 3,
        scrollBeyondLastLine: false,
        tabSize: 2,
        insertSpaces: true,
        theme: 'orayo-light',
        wordWrap: 'off',
        folding: true,
        renderValidationDecorations: 'on',
        quickSuggestions: false,
        suggestOnTriggerCharacters: false,
        wordBasedSuggestions: 'off',
        parameterHints: { enabled: false },
        suggest: {
          showWords: false,
          showSnippets: false,
          showKeywords: false
        },
        padding: { top: 12, bottom: 12 },
        fontSize: 13,
        fontFamily: 'Cascadia Mono, Consolas, monospace'
      });

      window.__editor = editor;
      window.__editorReady = true;
    });

    window.setEditorContent = function (text) {
      if (window.__editorReady && window.__editor) {
        window.__editor.setValue(text || '');
      } else {
        window.__pendingValue = text || '';
      }
    };

    window.isEditorReady = function () {
      return window.__editorReady;
    };

    window.getEditorContent = function () {
      return window.__editor ? window.__editor.getValue() : (window.__pendingValue || '');
    };

    window.formatEditorContent = async function () {
      if (!window.__editor) {
        return window.__pendingValue || '';
      }

      await window.__editor.getAction('editor.action.formatDocument').run();
      return window.__editor.getValue();
    };
  </script>
</body>
</html>
