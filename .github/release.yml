changelog:
  categories:
    - title: "✨ 新功能"
      labels: ["feature", "enhancement"]
    - title: "🐛 修复"
      labels: ["bug", "fix"]
    - title: "🌐 国际化"
      labels: ["i18n", "localization"]
    - title: "📖 文档"
      labels: ["documentation", "docs"]
    - title: "🔧 其他"
      labels: ["*"]
  exclude:
    labels:
      - "dependencies"
      - "chore"
