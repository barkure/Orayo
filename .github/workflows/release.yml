name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v26.5.17.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      CONFIGURATION: Release
      RUNTIME_ID: win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ inputs.version }}"
          } else {
            "${{ github.ref_name }}"
          }

          if ($version -notmatch '^v\d{2}\.\d{1,2}\.\d{1,2}(\.\d+)?$') {
            throw "Version '$version' is invalid. Use a tag like v26.5.17.1."
          }

          $numericVersion = $version.TrimStart('v')
          $versionParts = $numericVersion -split '\.'
          $assemblyVersion = if ($versionParts.Count -eq 3) {
            "$numericVersion.0"
          } else {
            $numericVersion
          }
          $velopackVersion = if ($versionParts.Count -eq 4) {
            "$($versionParts[0]).$($versionParts[1]).$($versionParts[2])-r$($versionParts[3])"
          } else {
            $numericVersion
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "numeric_version=$numericVersion" >> $env:GITHUB_OUTPUT
          "assembly_version=$assemblyVersion" >> $env:GITHUB_OUTPUT
          "velopack_version=$velopackVersion" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Orayo.csproj -r $env:RUNTIME_ID

      - name: Verify bundled runtime assets
        shell: pwsh
        run: |
          $requiredFiles = @(
            "Assets/engine/xray.exe",
            "Assets/engine/wintun.dll",
            "Assets/rules/geoip.dat",
            "Assets/rules/geosite.dat"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Required bundled asset is missing: $file"
            }
          }

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish Orayo.csproj `
            -c $env:CONFIGURATION `
            -r $env:RUNTIME_ID `
            --self-contained true `
            -p:WindowsAppSDKSelfContained=true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=true `
            -p:Version=${{ steps.version.outputs.assembly_version }} `
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} `
            -p:FileVersion=${{ steps.version.outputs.assembly_version }} `
            -o artifacts/publish

      - name: Create Velopack release
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $packVersion = "${{ steps.version.outputs.velopack_version }}"
          $repoUrl = "https://github.com/${{ github.repository }}"

          dotnet tool install -g vpk --version 0.0.1298
          vpk pack `
            --packId Orayo `
            --packTitle Orayo `
            --packAuthors barkure `
            --packVersion $packVersion `
            --packDir artifacts/publish `
            --mainExe Orayo.exe `
            --runtime $env:RUNTIME_ID `
            --icon Assets/AppIcon.ico `
            --outputDir artifacts/velopack

          $portablePath = "artifacts/velopack/Orayo-win-Portable.zip"
          $setupPath = "artifacts/velopack/Orayo-win-Setup.exe"
          if (Test-Path $portablePath) {
            Move-Item $portablePath "artifacts/velopack/Orayo-$version-Portable.zip" -Force
          }
          if (Test-Path $setupPath) {
            Move-Item $setupPath "artifacts/velopack/Orayo-$version-Setup.exe" -Force
          }

          vpk upload github `
            --repoUrl $repoUrl `
            --token "${{ secrets.GITHUB_TOKEN }}" `
            --outputDir artifacts/velopack `
            --publish `
            --merge `
            --releaseName "Orayo $version" `
            --tag $version

      - name: Generate GitHub release notes
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = '${{ steps.version.outputs.version }}';
            const generated = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              target_commitish: context.sha
            });

            core.setOutput('body', generated.data.body);

      - name: Update GitHub release notes
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = '${{ steps.version.outputs.version }}';
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tagName
            });

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              body: ${{ toJson(steps.release_notes.outputs.body) }}
            });

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orayo-${{ steps.version.outputs.version }}
          path: artifacts/velopack/*
          if-no-files-found: error
